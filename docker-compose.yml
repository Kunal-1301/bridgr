services:
  db:
    image: postgres:16-alpine
    container_name: bridgr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bridgr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bridgr"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bridgr-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: kunalforever123@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin12345
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build:
      context: ./backend
    container_name: bridgr-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/bridgr
      ENVIRONMENT: development
      APP_NAME: Bridgr API

      JWT_SECRET: dev_access_secret_change_later
      JWT_REFRESH_SECRET: dev_refresh_secret_change_later
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 30

      FRONTEND_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000

      ADMIN_EMAIL: kunalforever123@gmail.com
      ADMIN_PASSWORD: Admin12345!
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.scripts.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
    container_name: bridgr-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_API_URL: http://localhost:8000/api/v1
      VITE_WS_URL: ws://localhost:8000
      VITE_APP_NAME: Bridgr
      VITE_APP_ENV: development
      VITE_USE_MOCKS: "false"
      VITE_ENABLE_DEMO_AUTH: "false"
      VITE_ENABLE_API_MOCKS: "false"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  pgadmin_data:
  frontend_node_modules: